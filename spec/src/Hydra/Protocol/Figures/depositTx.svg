<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 15 690 205">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8.5" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="690" height="220" fill="white"/>
  <!-- input dashed box -->
  <rect x="18" y="25" width="160" height="175" rx="4" fill="none" stroke="#444" stroke-width="1.5" stroke-dasharray="7,4"/>
  <circle cx="38" cy="83" r="4" fill="white" stroke="#1a1a1a" stroke-width="1.4"/>
  <text x="50" y="87" text-anchor="start" font-family="serif" font-size="10" fill="#1a1a1a" font-style="italic">in₁: 15 ada</text>
  <circle cx="38" cy="141" r="4" fill="white" stroke="#1a1a1a" stroke-width="1.4"/>
  <text x="50" y="145" text-anchor="start" font-family="serif" font-size="10" fill="#1a1a1a" font-style="italic">in₂: 7 ada</text>
  <!-- tx box -->
  <rect x="248" y="30" width="155" height="160" rx="2" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="249" y="31" width="153" height="27" rx="0" fill="#FFEA94" stroke="none" stroke-width="0"/>
  <text x="325" y="49" text-anchor="middle" font-family="serif" font-size="13" fill="#1a1a1a" font-weight="bold">depositTx</text>
  <line x1="248" y1="58" x2="403" y2="58" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- ν_deposit output box: header + datum|redeemer columns + value row -->
  <rect x="468" y="35" width="205" height="98" rx="14" fill="#f9fafb" stroke="#1a1a1a" stroke-width="1.8"/>
  <rect x="468" y="35" width="205" height="24" rx="14" fill="#ACE9BB"/>
  <rect x="468" y="45" width="205" height="14" fill="#ACE9BB"/>
  <line x1="468" y1="59" x2="673" y2="59" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="568" y1="59" x2="568" y2="109" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="468" y1="109" x2="673" y2="109" stroke="#1a1a1a" stroke-width="0.8"/>
  <text x="570" y="52" text-anchor="middle" font-family="serif" font-size="12" fill="#1a1a1a" font-style="italic" font-weight="bold">ν<tspan baseline-shift="-25%" font-size="8">deposit</tspan></text>
  <!-- left column: datum -->
  <text x="518" y="75" text-anchor="middle" font-family="serif" font-size="10" fill="#1a1a1a" font-style="italic">cid,</text>
  <text x="518" y="88" text-anchor="middle" font-family="serif" font-size="10" fill="#1a1a1a" font-style="italic">DL,</text>
  <text x="518" y="101" text-anchor="middle" font-family="serif" font-size="10" fill="#1a1a1a" font-style="italic">[Commit]</text>
  <!-- right column: redeemer -->
  <text x="620" y="88" text-anchor="middle" font-family="serif" font-size="10" fill="#1a1a1a" font-style="italic">Claim</text>
  <!-- bottom row: value -->
  <text x="570" y="125" text-anchor="middle" font-family="serif" font-size="10" fill="#1a1a1a" font-style="italic">22 ada</text>
  <!-- dotted arc from input box to output box -->
  <path d="M 178,70 C 178,5 420,101 468,101" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <!-- arrows from input to tx box -->
  <circle cx="178" cy="90" r="4" fill="white" stroke="#1a1a1a" stroke-width="1.4"/>
  <path d="M178,90 C210,90 235,90 248,90" fill="none" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="178" cy="130" r="4" fill="white" stroke="#1a1a1a" stroke-width="1.4"/>
  <path d="M178,130 C210,130 235,130 248,130" fill="none" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- arrow from tx box to output box -->
  <circle cx="403" cy="108" r="4" fill="white" stroke="#1a1a1a" stroke-width="1.4"/>
  <path d="M403,108 C430,108 450,80 468,80" fill="none" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>
  <circle cx="468" cy="80" r="4" fill="white" stroke="#1a1a1a" stroke-width="1.4"/>
</svg>
